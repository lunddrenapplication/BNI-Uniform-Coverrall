<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>LunddrenDev-Application</title>
	<style>
		body,
		html {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background-color: #000;
		}

		iframe {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			border: none;
		}

		#start-overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background-color: #0f172a;
			color: #fff;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			z-index: 1000;
			transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
		}

		.brand-text {
			font-size: 32px;
			font-weight: 600;
			letter-spacing: 2px;
			background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
			background-size: 200% auto;
			color: transparent;
			-webkit-background-clip: text;
			background-clip: text;
			animation: shine 2.5s linear infinite, slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
			opacity: 0;
			transform: translateY(20px);
		}

		.loader-line {
			width: 0px;
			height: 2px;
			background: #3b82f6;
			margin-top: 20px;
			border-radius: 2px;
			animation: loadLine 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
			animation-delay: 0.5s;
			opacity: 0;
		}

		@keyframes shine {
			to { background-position: 200% center; }
		}

		@keyframes slideUpFade {
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@keyframes loadLine {
			0% { width: 0px; opacity: 0; }
			20% { opacity: 1; }
			100% { width: 150px; opacity: 1; }
		}
	</style>
</head>

<body>
	<div id="start-overlay">
		<div class="brand-text">LunddrenDev-Applications</div>
		<div class="loader-line"></div>
	</div>
	<iframe
		src="https://script.google.com/macros/s/AKfycbyMvCBInKGUXvuMqus3-V0gEdxi3TL4UTK0MwAr0EUozh7keMZX0jc0qyQe1XkYCxOl/exec"
		scrolling="no" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>

	<script>
		const overlay = document.getElementById('start-overlay');

		function goFullscreen() {
			var docElm = document.documentElement;
			var requestFS = docElm.requestFullscreen || docElm.mozRequestFullScreen || docElm.webkitRequestFullScreen || docElm.msRequestFullscreen;
			if (requestFS) {
				requestFS.call(docElm).catch(err => {
					console.log("Fullscreen request failed:", err);
				});
			}
		}

		function hideOverlay() {
			overlay.style.opacity = '0';
			setTimeout(() => {
				overlay.style.display = 'none';
			}, 800); // Wait for the transition to finish
		}

		function showOverlay() {
			overlay.style.display = 'flex';
			setTimeout(() => {
				overlay.style.opacity = '1';
			}, 10);
		}

		// Automatically hide the cinematic loading screen after 3.5 seconds
		setTimeout(() => {
			hideOverlay();
		}, 3500);

		// If the user clicks while the loading screen is up, force fullscreen early
		overlay.addEventListener('click', function() {
			goFullscreen();
			hideOverlay();
		});

		// Fallback: Catch any rogue clicks/touches on the wrapper body to force fullscreen later
		document.body.addEventListener('click', function(e) {
			const isFullscreen = document.fullscreenElement || document.webkitIsFullScreen || document.mozFullScreen || document.msFullscreenElement;
			if (!isFullscreen) {
				goFullscreen();
			}
		}, true);
		
		document.body.addEventListener('touchstart', function(e) {
			const isFullscreen = document.fullscreenElement || document.webkitIsFullScreen || document.mozFullScreen || document.msFullscreenElement;
			if (!isFullscreen) {
				goFullscreen();
			}
		}, { passive: true, capture: true });
	</script>
</body>

</html>
